<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHF EQ-5D-5L Monthly Dashboard & Tracking</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #334155; margin: 0; padding: 0; }
        header { background-color: #4338ca; color: white; padding: 20px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 30px; }
        .col-left { flex: 1; min-width: 350px; background: white; padding: 25px; border-radius: 16px; border: 1px solid #e2e8f0; }
        .col-right { width: 400px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; }
        h1, h2, h3 { margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .form-group select, .form-group input[type="text"], .form-group input[type="date"] { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .flex-3 { display: flex; gap: 10px; background: #f1f5f9; padding: 10px; border-radius: 12px; margin-bottom: 15px; }
        .flex-3 div { flex: 1; }
        button { width: 100%; background: #4338ca; color: white; border: none; padding: 12px; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 16px; }
        button:hover { background: #3730a3; }
        .btn-group { display: flex; gap: 6px; }
        .btn-export { background: #10b981; padding: 6px 12px; width: auto; font-size: 12px; border-radius: 6px; }
        .btn-export:hover { background: #047857; }
        .btn-clear { background: #ef4444; padding: 6px 12px; width: auto; font-size: 12px; border-radius: 6px; }
        .btn-clear:hover { background: #b91c1c; }
        
        .chart-container { display: flex; height: 180px; align-items: flex-end; justify-content: space-around; border-bottom: 2px solid #cbd5e1; padding-bottom: 10px; margin-top: 20px; }
        .month-group { display: flex; flex-direction: column; align-items: center; width: 8%; }
        .bars-flex { display: flex; align-items: flex-end; gap: 2px; height: 140px; width: 100%; justify-content: center; }
        .bar { width: 6px; min-height: 2px; border-radius: 2px 2px 0 0; position: relative; }
        .bar:hover::after { content: attr(data-value); position: absolute; top: -20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; font-size: 10px; padding: 2px 4px; border-radius: 4px; z-index: 10; white-space: nowrap; }
        .bar-baseline { background-color: #64748b; }
        .bar-3m { background-color: #0ea5e9; }
        .bar-6m { background-color: #f59e0b; }
        .bar-1y { background-color: #a855f7; }
        .month-label { font-size: 11px; margin-top: 5px; color: #64748b; font-weight: bold; }
        .legend { display: flex; justify-content: center; gap: 10px; font-size: 11px; margin-top: 15px; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 5px; display: inline-block; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: left; }
        th, td { padding: 8px; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; color: #64748b; }
        .badge { padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .hidden { display: none; }
        .summary-alert { padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 14px; line-height: 1.5; }
        .empty-text { text-align: center; color: #94a3b8; padding: 20px; font-style: italic; }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0;">🩺 CHF EQ-5D-5L Tracking System</h2>
        <p style="margin:5px 0 0 0; font-size:12px; opacity:0.8;">ระบบประเมินคุณภาพชีวิตผู้ป่วยภาวะหัวใจล้มเหลวและแดชบอร์ดสถิติรายเดือน</p>
    </header>

    <div class="container">
        
        <div class="col-left" id="assessment-section">
            <h3 style="border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; color: #1e3a8a;">📝 แบบประเมินคุณภาพชีวิต</h3>
            
            <form id="eq5dForm">
                <div class="flex-3">
                    <div>
                        <label>HN ผู้ป่วย *</label>
                        <input type="text" id="patientHN" required placeholder="เช่น HN691234">
                    </div>
                    <div>
                        <label>วันที่ประเมิน *</label>
                        <input type="date" id="evalDate" required>
                    </div>
                    <div>
                        <label>ช่วงเวลา *</label>
                        <select id="timePeriod" required>
                            <option value="Baseline">Baseline</option>
                            <option value="3 เดือน">ครบ 3 เดือน</option>
                            <option value="6 เดือน">ครบ 6 เดือน</option>
                            <option value="1 ปี">ครบ 1 ปี</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>1. การเคลื่อนไหว (Mobility)</label>
                    <select id="m1">
                        <option value="1">1 - ไม่มีความลำบากในการเดิน</option>
                        <option value="2">2 - มีความลำบากในการเดินเล็กน้อย</option>
                        <option value="3">3 - มีความลำบากในการเดินปานกลาง</option>
                        <option value="4">4 - มีความลำบากในการเดินอย่างมาก</option>
                        <option value="5">5 - ไม่สามารถเดินไปไหนมาไหนได้เลย</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>2. การดูแลตัวเอง (Self-Care)</label>
                    <select id="m2">
                        <option value="1">1 - ไม่มีความลำบากในการอาบน้ำหรือแต่งตัว</option>
                        <option value="2">2 - มีความลำบากในการอาบน้ำหรือแต่งตัวเล็กน้อย</option>
                        <option value="3">3 - มีความลำบากในการอาบน้ำหรือแต่งตัวปานกลาง</option>
                        <option value="4">4 - มีความลำบากในการอาบน้ำหรือแต่งตัวอย่างมาก</option>
                        <option value="5">5 - ไม่สามารถอาบน้ำหรือแต่งตัวได้เลย</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>3. การทำกิจกรรมประจำวัน (Usual Activities)</label>
                    <select id="m3">
                        <option value="1">1 - ไม่มีความลำบากในการทำกิจกรรมประจำวัน</option>
                        <option value="2">2 - มีความลำบากในการทำกิจกรรมประจำวันเล็กน้อย</option>
                        <option value="3">3 - มีความลำบากในการทำกิจกรรมประจำวันปานกลาง</option>
                        <option value="4">4 - มีความลำบากในการทำกิจกรรมประจำวันอย่างมาก</option>
                        <option value="5">5 - ไม่สามารถทำกิจกรรมประจำวันได้เลย</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>4. อาการเจ็บปวด/ไม่สบายตัว (Pain/Discomfort)</label>
                    <select id="m4">
                        <option value="1">1 - ไม่มีอาการเจ็บปวดหรือรู้สึกไม่สบายตัว</option>
                        <option value="2">2 - มีอาการเจ็บปวดหรือรู้สึกไม่สบายตัวเล็กน้อย</option>
                        <option value="3">3 - มีอาการเจ็บปวดหรือรู้สึกไม่สบายตัวปานกลาง</option>
                        <option value="4">4 - มีอาการเจ็บปวดหรือรู้สึกไม่สบายตัวอย่างมาก</option>
                        <option value="5">5 - มีอาการเจ็บปวดหรือรู้สึกไม่สบายตัวร้ายแรงที่สุด</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>5. อาการวิตกกังวล/ซึมเศร้า (Anxiety/Depression)</label>
                    <select id="m5">
                        <option value="1">1 - ไม่รู้สึกวิตกกังวลหรือซึมเศร้า</option>
                        <option value="2">2 - รู้สึกวิตกกังวลหรือซึมเศร้าเล็กน้อย</option>
                        <option value="3">3 - รู้สึกวิตกกังวลหรือซึมเศร้าปานกลาง</option>
                        <option value="4">4 - รู้สึกวิตกกังวลหรือซึมเศร้าอย่างมาก</option>
                        <option value="5">5 - รู้สึกวิตกกังวลหรือซึมเศร้าร้ายแรงที่สุด</option>
                    </select>
                </div>

                <div class="form-group" style="background:#e0e7ff; padding:12px; border-radius:10px;">
                    <label style="color:#1e3a8a;">6. คะแนนสุขภาพวันนี้ (EQ-VAS คะแนน 0 - 100)</label>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <input type="range" id="eqVas" min="0" max="100" value="70" style="flex:1;" oninput="document.getElementById('vasVal').innerText = this.value">
                        <span id="vasVal" style="font-size:20px; font-weight:bold; color:#4338ca; width:40px; text-align:center;">70</span>
                    </div>
                </div>

                <button type="button" onclick="handleSubmit()">💾 บันทึกข้อมูล (Submit)</button>
            </form>

            <div id="summary-box" class="hidden">
                <h4 style="margin: 20px 0 5px 0;">📢 ข้อความสรุปผลทางคลินิก</h4>
                <div id="summary-content"></div>
            </div>
        </div>

        <div class="col-right">
            
            <div class="card" id="dashboard-section">
                <h3 style="margin-bottom:2px; font-size:16px;">📊 จำนวนเคสสะสมในแต่ละเดือน</h3>
                <span style="font-size:11px; color:#64748b;">สถิติจำนวนผู้ประเมินแยกตามกลุ่มเป้าหมาย</span>
                
                <div class="chart-container" id="pureCssChart">
                    </div>

                <div class="legend">
                    <div class="legend-item"><span class="dot" style="background:#64748b;"></span>Base</div>
                    <div class="legend-item"><span class="dot" style="background:#0ea5e9;"></span>3M</div>
                    <div class="legend-item"><span class="dot" style="background:#f59e0b;"></span>6M</div>
                    <div class="legend-item"><span class="dot" style="background:#a855f7;"></span>1Y</div>
                </div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3 style="margin:0; font-size:15px;">📋 รายการบันทึกล่าสุด</h3>
                    <div class="btn-group">
                        <button type="button" class="btn-export" onclick="exportToCSV()">📥 Export CSV</button>
                        <button type="button" class="btn-clear" onclick="clearAllData()">🗑️ ล้างทั้งหมด</button>
                    </div>
                </div>
                <div style="max-height:220px; overflow-y:auto; border:1px solid #f1f5f9;">
                    <table>
                        <thead>
                            <tr>
                                <th>HN</th>
                                <th>Timeline</th>
                                <th style="text-align:center;">Utility</th>
                                <th style="text-align:center;">VAS</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTable"></tbody>
                    </table>
                </div>
            </div>

        </div>

    </div>

    <script>
        // เคลียร์ข้อมูลทดสอบเริ่มต้นออกทั้งหมด (เริ่มต้นระบบด้วยอาร์เรย์ว่าง)
        let eq5dRecords = JSON.parse(localStorage.getItem('eq5dRecords')) || [];

        const monthNamesTH = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];

        window.onload = function() {
            document.getElementById('evalDate').value = new Date().toISOString().split('T')[0];
            updateTable();
            renderPureCssChart();
        };

        function calculateThailandUtilityScore(code) {
            if (code === "11111") return 1.000;
            let score = 1.000 - 0.2032; 
            const weights = {
                m1: [0, 0, 0.0435, 0.0869, 0.1738, 0.2608],
                m2: [0, 0, 0.0398, 0.0796, 0.1592, 0.2388],
                m3: [0, 0, 0.0384, 0.0768, 0.1536, 0.2304],
                m4: [0, 0, 0.0512, 0.1024, 0.2048, 0.3072],
                m5: [0, 0, 0.0461, 0.0922, 0.1844, 0.2766]
            };
            score -= weights.m1[parseInt(code[0])];
            score -= weights.m2[parseInt(code[1])];
            score -= weights.m3[parseInt(code[2])];
            score -= weights.m4[parseInt(code[3])];
            score -= weights.m5[parseInt(code[4])];
            if (score < -0.2) score = -0.2;
            return parseFloat(score.toFixed(3));
        }

        function handleSubmit() {
            const hn = document.getElementById('patientHN').value.trim();
            const date = document.getElementById('evalDate').value;
            const period = document.getElementById('timePeriod').value;
            const vas = parseInt(document.getElementById('eqVas').value);

            if(!hn || !date) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วนก่อนส่งข้อมูลครับ");
                return;
            }

            const code5d = "" + document.getElementById('m1').value + document.getElementById('m2').value + document.getElementById('m3').value + document.getElementById('m4').value + document.getElementById('m5').value;
            const utilityScore = calculateThailandUtilityScore(code5d);

            eq5dRecords.push({ hn, date, period, code: code5d, score: utilityScore, vas });
            localStorage.setItem('eq5dRecords', JSON.stringify(eq5dRecords));

            generateSummaryText(hn, period, code5d, utilityScore, vas);
            updateTable();
            renderPureCssChart();

            alert("บันทึกข้อมูลคนไข้สำเร็จเรียบร้อยครับ!");
            
            // ล้างฟิลด์ HN ออกหลังบันทึกเสร็จ เพื่อให้พร้อมคีย์เคสถัดไป
            document.getElementById('patientHN').value = '';
        }

        function generateSummaryText(hn, period, code, score, vas) {
            const box = document.getElementById('summary-box');
            const content = document.getElementById('summary-content');
            box.style.display = "block";

            let bg = "#ecfdf5"; let color = "#065f46"; let msg = "❤️ คุณภาพชีวิตดีคงที่ในเกณฑ์มาตรฐานสากล";
            if(score < 0.50) { bg = "#fef2f2"; color = "#991b1b"; msg = "🚨 ระดับดัชนีคุณภาพชีวิตต่ำวิกฤต เสี่ยงต่อภาวะน้ำเกินเฉียบพลัน"; }
            else if(score < 0.75) { bg = "#fffbec"; color = "#92400e"; msg = "⚠️ ระดับคุณภาพชีวิตปานกลาง ควรเน้นย้ำเรื่องยาและการชั่งน้ำหนัก"; }

            content.innerHTML = `
                <div class="summary-alert" style="background:${bg}; color:${color}; border: 1px solid ${color}30;">
                    <strong>ผู้ป่วย HN:</strong> ${hn} | <strong>ระยะติดตาม:</strong> ${period}<br>
                    <strong>รหัส 5 มิติ:</strong> ${code} | <strong>Thailand Utility Score:</strong> ${score.toFixed(3)}<br>
                    <strong>คะแนนสุขภาพวันนี้ (EQ-VAS):</strong> ${vas} / 100 คะแนน<br>
                    <hr style="margin:10px 0; opacity:0.2;">
                    ${msg}
                </div>`;
        }

        function updateTable() {
            const tbody = document.getElementById('recordsTable');
            tbody.innerHTML = '';
            
            if(eq5dRecords.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-text">ยังไม่มีข้อมูลบันทึกในระบบ</td></tr>';
                return;
            }

            let reversed = [...eq5dRecords].reverse();
            reversed.forEach(rec => {
                let badgeBg = "#e2e8f0"; let badgeColor = "#334155";
                if(rec.period === "3 เดือน") { badgeBg = "#e0f2fe"; badgeColor = "#0369a1"; }
                else if(rec.period === "6 เดือน") { badgeBg = "#fef3c7"; badgeColor = "#b45309"; }
                else if(rec.period === "1 ปี") { badgeBg = "#f3e8ff"; badgeColor = "#6b21a8"; }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:bold;">${rec.hn}</td>
                    <td><span class="badge" style="background:${badgeBg}; color:${badgeColor};">${rec.period}</span></td>
                    <td style="text-align:center; font-weight:bold; color:#4338ca;">${rec.score.toFixed(3)}</td>
                    <td style="text-align:center;">${rec.vas}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderPureCssChart() {
            const container = document.getElementById('pureCssChart');
            container.innerHTML = '';

            let dataCount = { 'Baseline': Array(12).fill(0), '3 เดือน': Array(12).fill(0), '6 เดือน': Array(12).fill(0), '1 ปี': Array(12).fill(0) };
            
            eq5dRecords.forEach(rec => {
                if(rec.date) {
                    let parts = rec.date.split('-');
                    if(parts.length >= 2) {
                        let mIdx = parseInt(parts[1], 10) - 1;
                        if(mIdx >= 0 && mIdx <= 11 && dataCount[rec.period]) { dataCount[rec.period][mIdx]++; }
                    }
                }
            });

            let maxVal = 1;
            for(let p in dataCount) { dataCount[p].forEach(v => { if(v > maxVal) maxVal = v; }); }

            for(let i=0; i<12; i++) {
                let vBase = dataCount['Baseline'][i];
                let v3m = dataCount['3 เดือน'][i];
                let v6m = dataCount['6 เดือน'][i];
                let v1y = dataCount['1 ปี'][i];

                let hBase = Math.max(2, (vBase / maxVal) * 130);
                let h3m = Math.max(2, (v3m / maxVal) * 130);
                let h6m = Math.max(2, (v6m / maxVal) * 130);
                let h1y = Math.max(2, (v1y / maxVal) * 130);

                let mGroup = document.createElement('div');
                mGroup.className = 'month-group';
                mGroup.innerHTML = `
                    <div class="bars-flex">
                        <div class="bar bar-baseline" style="height:${hBase}px" data-value="Base: ${vBase} ราย"></div>
                        <div class="bar bar-3m" style="height:${h3m}px" data-value="3M: ${v3m} ราย"></div>
                        <div class="bar bar-6m" style="height:${h6m}px" data-value="6M: ${v6m} ราย"></div>
                        <div class="bar bar-1y" style="height:${h1y}px" data-value="1Y: ${v1y} ราย"></div>
                    </div>
                    <div class="month-label">${monthNamesTH[i]}</div>
                `;
                container.appendChild(mGroup);
            }
        }

        function exportToCSV() {
            if(eq5dRecords.length === 0) { alert("ไม่มีข้อมูลสำหรับการส่งออก"); return; }
            let csv = "\uFEFFHN,วันที่ประเมิน,ช่วงเวลา,EQ5D Code,Utility Score,EQ-VAS\n";
            eq5dRecords.forEach(r => {
                csv += `${r.hn},${r.date},${r.period},${r.code},${r.score.toFixed(3)},${r.vas}\n`;
            });

            let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "CHF_EQ5D5L_Report.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ฟังก์ชันล้างข้อมูลทั้งหมดในคลิกเดียว
        function clearAllData() {
            if(confirm("คุณต้องการล้างข้อมูลผู้ป่วยที่บันทึกไว้ทั้งหมดใช่หรือไม่? (ข้อมูลจะหายถาวร)")) {
                eq5dRecords = [];
                localStorage.removeItem('eq5dRecords');
                document.getElementById('summary-box').style.display = "none";
                updateTable();
                renderPureCssChart();
                alert("ล้างข้อมูลการทดสอบออกจากระบบเรียบร้อยแล้วครับ");
            }
        }
    </script>
</body>
</html>
