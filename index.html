<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHF EQ-5D-5L Assessment & Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <header class="bg-indigo-700 text-white shadow-md">
        <div class="container mx-auto px-4 py-5 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2">🩺 CHF EQ-5D-5L Tracking System</h1>
                <p class="text-xs text-indigo-200 mt-0.5">ระบบบันทึกคุณภาพชีวิตผู้ป่วยภาวะหัวใจล้มเหลวและแดชบอร์ด</p>
            </div>
            <div class="flex gap-2">
                <a href="#assessment-section" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium transition">📝 แบบประเมิน</a>
                <a href="#dashboard-section" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm font-medium transition">📊 Dashboard</a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <section id="assessment-section" class="lg:col-span-7 bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
            <h2 class="text-xl font-bold text-slate-900 mb-5 flex items-center gap-2 border-b border-slate-100 pb-3">
                📝 บันทึกแบบประเมินคุณภาพชีวิต (EQ-5D-5L)
            </h2>
            
            <form id="eq5dForm" class="space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">HN ผู้ป่วย *</label>
                        <input type="text" id="patientHN" required placeholder="เช่น HN691234" class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">วันที่ประเมิน *</label>
                        <input type="date" id="evalDate" required class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">ช่วงเวลาประเมิน *</label>
                        <select id="timePeriod" required class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
                            <option value="Baseline">Baseline (แรกรับ)</option>
                            <option value="3 เดือน">ครบประเมิน 3 เดือน</option>
                            <option value="6 เดือน">ครบประเมิน 6 เดือน</option>
                            <option value="3 ปี">ครบประเมิน 3 ปี</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-5">
                    <h3 class="text-sm font-bold text-indigo-900 uppercase tracking-wider">ระบุระดับปัญหาในแต่ละด้าน (ระดับ 1 - 5)</h3>
                    
                    <div class="bg-white border border-slate-100 rounded-xl p-4 shadow-2xs">
                        <label class="block font-medium text-slate-900 mb-2">1. การเคลื่อนไหว (Mobility)</label>
                        <select name="m1" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-indigo-500">
                            <option value="1">1 - ฉันไม่มีความลำบากในการเดิน</option>
                            <option value="2">2 - ฉันมีความลำบากในการเดินเล็กน้อย</option>
                            <option value="3">3 - ฉันมีความลำบากในการเดินปานกลาง</option>
                            <option value="4">4 - ฉันมีความลำบากในการเดินอย่างมาก</option>
                            <option value="5">5 - ฉันไม่สามารถเดินไปไหนมาไหนได้เลย</option>
                        </select>
                    </div>

                    <div class="bg-white border border-slate-100 rounded-xl p-4 shadow-2xs">
                        <label class="block font-medium text-slate-900 mb-2">2. การดูแลตัวเอง (Self-Care)</label>
                        <select name="m2" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-indigo-500">
                            <option value="1">1 - ฉันไม่มีความลำบากในการอาบน้ำหรือแต่งตัวด้วยตัวเอง</option>
                            <option value="2">2 - ฉันมีความลำบากในการอาบน้ำหรือแต่งตัวด้วยตัวเองเล็กน้อย</option>
                            <option value="3">3 - ฉันมีความลำบากในการอาบน้ำหรือแต่งตัวด้วยตัวเองปานกลาง</option>
                            <option value="4">4 - ฉันมีความลำบากในการอาบน้ำหรือแต่งตัวด้วยตัวเองอย่างมาก</option>
                            <option value="5">5 - ฉันไม่สามารถอาบน้ำหรือแต่งตัวด้วยตัวเองได้เลย</option>
                        </select>
                    </div>

                    <div class="bg-white border border-slate-100 rounded-xl p-4 shadow-2xs">
                        <label class="block font-medium text-slate-900 mb-2">3. การทำกิจกรรมที่ชอบ/กิจวัตรประจำวัน (Usual Activities)</label>
                        <select name="m3" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-indigo-500">
                            <option value="1">1 - ฉันไม่มีความลำบากในการทำกิจกรรมประจำวัน (งานบ้าน, ทำงาน, เรียน, พักผ่อน)</option>
                            <option value="2">2 - ฉันมีความลำบากในการทำกิจกรรมประจำวันเล็กน้อย</option>
                            <option value="3">3 - ฉันมีความลำบากในการทำกิจกรรมประจำวันปานกลาง</option>
                            <option value="4">4 - ฉันมีความลำบากในการทำกิจกรรมประจำวันอย่างมาก</option>
                            <option value="5">5 - ฉันไม่สามารถทำกิจกรรมประจำวันได้เลย</option>
                        </select>
                    </div>

                    <div class="bg-white border border-slate-100 rounded-xl p-4 shadow-2xs">
                        <label class="block font-medium text-slate-900 mb-2">4. อาการเจ็บปวด หรือความไม่สบายตัว (Pain / Discomfort)</label>
                        <select name="m4" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-indigo-500">
                            <option value="1">1 - ฉันไม่มีอาการเจ็บปวดหรือรู้สึกไม่สบายตัว</option>
                            <option value="2">2 - ฉันมีอาการเจ็บปวดหรือรู้สึกไม่สบายตัวเล็กน้อย</option>
                            <option value="3">3 - ฉันมีอาการเจ็บปวดหรือรู้สึกไม่สบายตัวปานกลาง</option>
                            <option value="4">4 - ฉันมีอาการเจ็บปวดหรือรู้สึกไม่สบายตัวอย่างมาก</option>
                            <option value="5">5 - ฉันมีอาการเจ็บปวดหรือรู้สึกไม่สบายตัวอย่างร้ายแรงที่สุด</option>
                        </select>
                    </div>

                    <div class="bg-white border border-slate-100 rounded-xl p-4 shadow-2xs">
                        <label class="block font-medium text-slate-900 mb-2">5. อาการวิตกกังวล หรือซึมเศร้า (Anxiety / Depression)</label>
                        <select name="m5" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-indigo-500">
                            <option value="1">1 - ฉันไม่รู้สึกวิตกกังวลหรือซึมเศร้า</option>
                            <option value="2">2 - ฉันรู้สึกวิตกกังวลหรือซึมเศร้าเล็กน้อย</option>
                            <option value="3">3 - ฉันรู้สึกวิตกกังวลหรือซึมเศร้าปานกลาง</option>
                            <option value="4">4 - ฉันรู้สึกวิตกกังวลหรือซึมเศร้าอย่างมาก</option>
                            <option value="5">5 - ฉันรู้สึกวิตกกังวลหรือซึมเศร้าอย่างร้ายแรงที่สุด</option>
                        </select>
                    </div>

                    <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4 shadow-2xs">
                        <label class="block font-bold text-indigo-950 mb-1">6. คะแนนสุขภาพวันนี้ (EQ-VAS คะแนน 0 - 100)</label>
                        <p class="text-xs text-indigo-700 mb-3">0 คือสุขภาพแย่ที่สุดที่จินตนาการได้ และ 100 คือสุขภาพดีที่สุดที่จินตนาการได้</p>
                        <div class="flex items-center gap-4">
                            <input type="range" id="eqVas" min="0"
